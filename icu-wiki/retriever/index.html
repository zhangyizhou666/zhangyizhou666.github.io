<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retriever System Design — ICU Wiki Research</title>
    <meta name="description" content="Interactive source-code map of the ICU Wiki hybrid retriever." />
    <link rel="stylesheet" href="/icu-wiki/assets/site.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <header class="site-header">
      <a class="brand" href="/icu-wiki/">
        <span class="brand-mark">ICU</span>
        <span>
          <strong>Yizhou's 卒論研究</strong>
          <small>ICU Wiki cost-aware RAG</small>
        </span>
      </a>
      <nav>
        <a href="/icu-wiki/">Home</a>
        <a href="/icu-wiki/updates/">Updates</a>
        <a href="/icu-wiki/#evaluation">Evaluation</a>
        <a href="/icu-wiki/evaluation/ragas/">RAGAS</a>
        <a href="/icu-wiki/retriever/">Retriever</a>
        <a href="/icu-wiki/benchmark/hard-realistic-20/">Benchmark</a>
        <a href="/icu-wiki/embeddings/">Embeddings</a>
        <a href="https://blackwell.tail740bf8.ts.net" target="_blank" rel="noreferrer">Live Chatbot</a>
      </nav>
    </header>
    <main>
    <section class="page-title compact-title retriever-title">
      <h1>Retriever System Design</h1>
    </section>

    <section class="section no-top">
      <div class="retriever-shell">
        <div class="retriever-graph" data-retriever-graph>
          <button class="retriever-node" data-node="q" style="grid-area:q;">User question</button>
          <span class="retriever-arrow down" style="grid-area:q-n;">↓</span>
          <button class="retriever-node" data-node="n" style="grid-area:n;">Normalize query text</button>
          <span class="retriever-arrow split-left" style="grid-area:n-l;">↙</span>
          <span class="retriever-arrow down" style="grid-area:n-c;">↓</span>
          <span class="retriever-arrow split-right" style="grid-area:n-e;">↘</span>

          <button class="retriever-node" data-node="l" style="grid-area:l;">Lexical / Japanese channel<br><small>PostgreSQL FTS</small></button>
          <button class="retriever-node decision" data-node="c" style="grid-area:c;">Entity-aware channel<br><small>person / course aliases</small></button>
          <button class="retriever-node" data-node="e" style="grid-area:e;">Dense channel<br><small>BGE-M3 query embedding</small></button>

          <span class="retriever-arrow down" style="grid-area:l-lq;">↓</span>
          <span class="retriever-arrow yes" style="grid-area:c-ct;">match ↓</span>
          <span class="retriever-arrow no" style="grid-area:c-cn;">none →</span>
          <span class="retriever-arrow down" style="grid-area:e-ea;">↓</span>

          <button class="retriever-node" data-node="lq" style="grid-area:lq;">PostgreSQL FTS + Japanese FTS</button>
          <button class="retriever-node" data-node="ct" style="grid-area:ct;">Extract alias candidates</button>
          <button class="retriever-node muted-node" data-node="cn" style="grid-area:cn;">No entity match</button>
          <button class="retriever-node" data-node="ea" style="grid-area:ea;">OpenRouter<br><small>baai/bge-m3 embedding</small></button>

          <span class="retriever-arrow down" style="grid-area:lq-ls;">↓</span>
          <span class="retriever-arrow down" style="grid-area:ct-cs;">↓</span>
          <span class="retriever-arrow down" style="grid-area:ea-es;">↓</span>

          <button class="retriever-node" data-node="ls" style="grid-area:ls;">Search title + text_for_embedding + body_text<br><small>and japanese_search_text</small></button>
          <button class="retriever-node" data-node="cs" style="grid-area:cs;">Search icu_entity_aliases + course docs</button>
          <button class="retriever-node" data-node="es" style="grid-area:es;">pgvector cosine search</button>

          <span class="retriever-arrow down" style="grid-area:ls-lc;">↓</span>
          <span class="retriever-arrow down" style="grid-area:cs-cc;">↓</span>
          <span class="retriever-arrow down" style="grid-area:es-dc;">↓</span>

          <button class="retriever-node" data-node="lc" style="grid-area:lc;">Lexical candidates</button>
          <button class="retriever-node" data-node="cc" style="grid-area:cc;">Entity candidates</button>
          <button class="retriever-node" data-node="dc" style="grid-area:dc;">Dense candidates</button>

          <span class="retriever-arrow merge-left" style="grid-area:lc-r;">↘</span>
          <span class="retriever-arrow down" style="grid-area:cc-r;">↓</span>
          <span class="retriever-arrow merge-right" style="grid-area:dc-r;">↙</span>
          <span class="retriever-arrow merge-skip" style="grid-area:cn-r;">↘</span>

          <button class="retriever-node emphasis" data-node="rrf" style="grid-area:rrf;">RRF merge<br><small>RRF_K = 60</small></button>
          <span class="retriever-arrow down" style="grid-area:rrf-t5;">↓</span>
          <button class="retriever-node emphasis" data-node="t5" style="grid-area:t5;">Final Top-5 evidence</button>
          <span class="retriever-arrow right" style="grid-area:t5-g;">→</span>
          <button class="retriever-node emphasis" data-node="g" style="grid-area:g;">Grounded answer generation</button>
        </div>
        <aside class="retriever-detail" data-retriever-detail hidden></aside>
      </div>
    </section>
    
    <script>
    (() => {
      const details = {"q": {"title": "User question", "source": "apps/local_demo/server.py -> /api/ask request body", "text": "The retriever starts from the raw user question sent by the website, LINE webhook, or demo page.", "code": "query = str(payload.get(\"query\", \"\")).strip()\nlimit = int(payload.get(\"limit\", 5))"}, "n": {"title": "Normalize query text", "source": "icu_runtime/postgres_backend.py:243-245; icu_runtime/qa_core.py:52-53", "text": "Whitespace is normalized before all retrieval channels run. This keeps empty or malformed queries out of the retriever.", "code": "def normalize_space(text: str) -> str:\n    return re.sub(r\"\\s+\", \" \", text or \"\").strip()\n\nquery = normalize_space(query)\nif not query or not self.ready:\n    return []"}, "l": {"title": "Lexical / Japanese channel", "source": "icu_runtime/postgres_backend.py:_lexical_results, _japanese_fts_results", "text": "The lexical side combines standard PostgreSQL full-text search with the Japanese search-text column when the query contains Japanese/CJK characters.", "formula": "lexical_score = ts_rank_cd(to_tsvector(title + text_for_embedding + body_text), websearch_to_tsquery(query))", "code": "ts_rank_cd(\n    to_tsvector(\n        'simple',\n        coalesce(title, '') || ' ' ||\n        coalesce(text_for_embedding, '') || ' ' ||\n        coalesce(body_text, '')\n    ),\n    websearch_to_tsquery('simple', %(query)s)\n) AS lexical_score"}, "lq": {"title": "PostgreSQL FTS + Japanese FTS", "source": "icu_runtime/postgres_backend.py:_lexical_results, _japanese_fts_results", "text": "English-style lexical search uses websearch_to_tsquery. Japanese queries also pass through a lightweight tokenizer and search japanese_search_text.", "code": "websearch_to_tsquery('simple', %(query)s)\n\ntokens = tokenize_japanese(query, max_tokens=24)\ntsquery = build_or_tsquery(tokens, max_tokens=24)"}, "ls": {"title": "FTS indexed fields", "source": "icu_runtime/postgres_backend.py:_lexical_results", "text": "The searchable lexical document includes the human title, metadata-rich text_for_embedding, raw body text, and the Japanese search-text column when available.", "code": "coalesce(title, '') || ' ' ||\ncoalesce(text_for_embedding, '') || ' ' ||\ncoalesce(body_text, '')"}, "lc": {"title": "Lexical candidates", "source": "icu_runtime/postgres_backend.py:146-152", "text": "The lexical channel returns ranked candidate passages before RRF merging.", "code": "ORDER BY lexical_score DESC\nLIMIT %(limit)s;\n\nreturn [(float(row[-1]), self._row_to_passage(row[:-1])) for row in rows]"}, "c": {"title": "Entity-aware channel", "source": "icu_runtime/postgres_backend.py:_entity_results; icu_runtime/entities.py", "text": "This channel detects known person names, course titles, and course numbers, then retrieves course-record passages linked to the matched entity.", "code": "aliases = query_entity_candidates(query)\nif not aliases:\n    return []"}, "ct": {"title": "Extract alias candidates", "source": "icu_runtime/entities.py:query_entity_candidates", "text": "The query is normalized into deterministic alias candidates. Honorific suffixes such as 先生 are removed before lookup.", "code": "raw_candidates = [query]\nraw_candidates.extend(word_terms(query))\nraw_candidates.extend(tokenize_japanese(query, max_tokens=24))\nraw_candidates.extend(cjk_query_terms(query, max_terms=24))"}, "cs": {"title": "Alias table + course docs", "source": "icu_runtime/postgres_backend.py:_entity_results", "text": "Matched aliases expand to related course doc_ids. Candidate passages are then pulled from those course records.", "formula": "entity_score = confidence + entity_type_weight + chunk_type_weight", "code": "JOIN matched_docs md ON p.doc_id = md.doc_id\nWHERE p.source_type = 'course_record'\n\nmax(\n    md.confidence +\n    CASE md.entity_type WHEN 'person' THEN 2.0 WHEN 'course' THEN 1.7 ELSE 1.0 END +\n    CASE coalesce(p.metadata_json->>'chunk_type', '') WHEN 'course_card' THEN 1.0 ELSE 0.0 END\n) AS entity_score"}, "cc": {"title": "Entity candidates", "source": "icu_runtime/postgres_backend.py:_entity_results", "text": "Entity candidates are sorted by entity score, then merged with lexical and dense candidates through RRF.", "code": "SELECT *\nFROM scored\nORDER BY entity_score DESC, length(body_text) ASC\nLIMIT %(limit)s;"}, "cn": {"title": "No entity match", "source": "icu_runtime/postgres_backend.py:_entity_results", "text": "If no known alias is detected, the entity channel contributes no candidates and retrieval falls back to lexical, Japanese FTS, and dense search.", "code": "if not aliases:\n    return []"}, "e": {"title": "Dense channel", "source": "icu_runtime/postgres_backend.py:84-94,215-241", "text": "Dense retrieval embeds the whole user question and compares it against one vector per passage chunk.", "formula": "dense_score(q,p) = 1 - cosine_distance(embedding(q), embedding(p))", "code": "response = client.embeddings.create(\n    model=openrouter_embedding_model(),\n    input=[query],\n)\nreturn list(response.data[0].embedding)"}, "ea": {"title": "OpenRouter BGE-M3 embedding", "source": "icu_runtime/config.py:11,94-95; icu_runtime/postgres_backend.py:88-90", "text": "The deployed demo calls OpenRouter for the query embedding. The current embedding model is baai/bge-m3.", "code": "DEFAULT_OPENROUTER_EMBEDDING_MODEL = \"baai/bge-m3\"\n\ndef openrouter_embedding_model() -> str:\n    return os.getenv(\"OPENROUTER_EMBEDDING_MODEL\", DEFAULT_OPENROUTER_EMBEDDING_MODEL)"}, "es": {"title": "pgvector cosine search", "source": "icu_runtime/postgres_backend.py:220-241", "text": "PostgreSQL pgvector orders passages by cosine distance between the query vector and stored passage embeddings.", "formula": "ORDER BY embedding <=> query_embedding; vector_score = 1 - (embedding <=> query_embedding)", "code": "1 - (embedding <=> %(embedding)s::vector) AS vector_score\nFROM icu_passages\nWHERE embedding IS NOT NULL\nORDER BY embedding <=> %(embedding)s::vector\nLIMIT %(limit)s;"}, "dc": {"title": "Dense candidates", "source": "icu_runtime/postgres_backend.py:238-241", "text": "Dense candidates are returned as passages with vector similarity scores before RRF merging.", "code": "cur.execute(sql, {\"embedding\": embedding_sql, \"limit\": limit})\nrows = cur.fetchall()\nreturn [(float(row[-1]), self._row_to_passage(row[:-1])) for row in rows]"}, "rrf": {"title": "RRF merge", "source": "icu_runtime/postgres_backend.py:30,248-268", "text": "Reciprocal Rank Fusion merges entity-aware, lexical/Japanese, and dense candidates by rank rather than raw score scale.", "formula": "RRF(p) = Σ_c 1 / (K + rank_c(p)), where K = 60", "code": "RRF_K = 60\n\nfor rank, (_, passage) in enumerate(result_rows, start=1):\n    item = merged.setdefault(passage.passage_id, {\"score\": 0.0, \"passage\": passage})\n    item[\"score\"] = float(item[\"score\"]) + 1.0 / (RRF_K + rank)"}, "t5": {"title": "Final Top-5 evidence", "source": "icu_runtime/postgres_backend.py:270-275", "text": "The final evidence list is the top ranked merged result set. The website and chatbot normally request five passages.", "code": "ranked = sorted(\n    ((float(item[\"score\"]), item[\"passage\"]) for item in merged.values()),\n    key=lambda value: value[0],\n    reverse=True,\n)\nreturn ranked[:limit]"}, "g": {"title": "Grounded answer generation", "source": "icu_runtime/generation.py:49-78,291-355", "text": "Generation receives the final evidence blocks and is instructed to answer only from those sources with citations.", "code": "prompt = build_grounded_prompt(query, results)\nif should_disable_qwen_thinking(resolved_model):\n    prompt = \"/no_think\\n\\n\" + prompt\n\nresponse = client.chat.completions.create(\n    model=resolved_model,\n    messages=[\n        {\"role\": \"system\", \"content\": \"You answer ICU institutional questions with grounded citations only.\"},\n        {\"role\": \"user\", \"content\": prompt},\n    ],\n)"}};
      const graph = document.querySelector("[data-retriever-graph]");
      const panel = document.querySelector("[data-retriever-detail]");
      if (!graph || !panel) return;

      const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));

      function render(key) {
        const item = details[key];
        if (!item) return;
        graph.querySelectorAll(".retriever-node").forEach((node) => {
          node.classList.toggle("active", node.dataset.node === key);
        });
        panel.hidden = false;
        panel.innerHTML = `
          <div class="retriever-detail-head">
            <h2>${escapeHtml(item.title)}</h2>
            <code>${escapeHtml(item.source)}</code>
          </div>
          <p>${escapeHtml(item.text)}</p>
          ${item.formula ? `<div class="retriever-formula"><strong>Formula</strong><code>${escapeHtml(item.formula)}</code></div>` : ""}
          ${item.code ? `<pre class="code-excerpt"><code>${escapeHtml(item.code)}</code></pre>` : ""}
        `;
      }

      graph.addEventListener("click", (event) => {
        const node = event.target.closest(".retriever-node");
        if (!node) return;
        render(node.dataset.node);
      });
      render("rrf");
    })();
    </script>
    
    </main>
    <footer class="site-footer">
      <span>ICU Wiki senior thesis research site.</span>
      <span>Last built 2026-05-13.</span>
    </footer>
  </body>
</html>
